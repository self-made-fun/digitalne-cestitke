<!DOCTYPE html>
<html lang="bs">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TWWMNRDSC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FG6NBT3RY4');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digitalne Čestitke & Pozivnice | Kreiraj i pošalji odmah</title>
    <meta name="description" content="Izradi unikatne digitalne čestitke i pozivnice za rođendan, vjenčanje ili godišnjicu. Personalizuj poruku i pošalji link putem vibera ili whatsapp-a.">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400;700&display=swap');
        :root { --primary: #ff4b6e; --gold: #d4af37; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; }
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #050508, #1a0505, #0a0a1a, #050508); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1; }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        #builder-site { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .form-part { width: 100%; max-width: 500px; background: var(--glass); backdrop-filter: blur(25px); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        h1 { font-family: 'Great Vibes'; font-size: 50px; color: var(--primary); text-align: center; margin: 0; }
        .tagline { text-align: center; color: #888; font-size: 10px; letter-spacing: 2px; margin-bottom: 25px; }
        
        label { display: block; font-size: 9px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .btn-gen { background: linear-gradient(45deg, var(--primary), #ff2d95); color: white; border: none; padding: 18px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        /* Social Share Stilovi */
        #share-section { display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .share-btns { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .share-icon { width: 40px; height: 40px; transition: transform 0.3s; cursor: pointer; }
        .share-icon:hover { transform: scale(1.1); }
        .btn-system { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .phone-wrapper { padding: 10px; background: linear-gradient(135deg, #d4af37, #8a6d3b); border-radius: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 50px; }
        .phone { width: 280px; height: 530px; border: 8px solid #111; border-radius: 40px; overflow: hidden; background: #000; position: relative; }
        #live-view { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px; box-sizing: border-box; }
        .main-symbol { font-size: 80px; animation: float 2s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--primary)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #romance-site { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 9999; justify-content: center; align-items: center; }
        #final-card { display: none; width: 85%; max-width: 400px; padding: 40px 25px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(212,175,55,0.2); text-align: center; }
        .create-own-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 50px; text-decoration: none; font-size: 11px; z-index: 10000; }
        .petal { position: absolute; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <main id="builder-site">
        <div class="form-part">
            <h1>Eternal Heart</h1>
            <p class="tagline">ČESTITKE I POZIVNICE KOJE SE PAMTE</p>
            
            <label>1. Odaberi vrstu kartice</label>
            <select id="set-theme" onchange="loadMessages()">
                <option value="🌹|🌹|#250000">Godišnjica (Ruže)</option>
                <option value="🎂|✨|#000025">Rođendan (Zvijezde)</option>
                <option value="🎈|🎉|#001a1a">Pozivnica za rođendan (Baloni)</option>
                <option value="💌|💍|#1a1000">Pozivnica za vjenčanje (Zlato)</option>
                <option value="💖|🌸|#1a001a">Ljubavna poruka (Cvijet)</option>
            </select>
            
            <label>2. Brze poruke (50 opcija)</label>
            <select id="quick-msg" onchange="applyQuickMsg()"></select>
            
            <label>3. Glavni Naslov</label>
            <input type="text" id="set-title" placeholder="Npr. Pozvani ste! ili Sretan rođendan..." oninput="updatePreview()">
            
            <label>4. Detalji ili poruka</label>
            <textarea id="set-msg" rows="4" placeholder="Napiši vrijeme, mjesto ili neku lijepu poruku..." oninput="updatePreview()"></textarea>
            
            <button class="btn-gen" onclick="generateAndCopy()">KREIRAJ I KOPIRAJ LINK 🚀</button>
            
            <div id="link-box" style="display:none; margin-top:15px; text-align:center; color:var(--gold); font-size:12px; font-weight:bold;">✅ Link je spreman i kopiran!</div>

            <div id="share-section">
                <label>Pošalji direktno putem:</label>
                <div class="share-btns">
                    <a id="share-wa" href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="share-icon"></a>
                    <a id="share-viber" href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670059.png" class="share-icon"></a>
                    <div class="btn-system" onclick="systemShare()"><img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" width="20" style="filter:invert(1)"></div>
                </div>
            </div>
        </div>

        <div class="phone-wrapper">
            <div class="phone"><div id="live-view">
                <div id="view-icon" class="main-symbol">🌹</div>
                <div id="view-title" style="font-family:'Great Vibes'; font-size:32px; color:var(--primary); margin-top:15px;"></div>
                <div id="view-msg" style="font-size:14px; color:#ccc; margin-top:10px; font-weight:200; line-height:1.5;"></div>
            </div></div>
        </div>
    </main>

    <div id="romance-site">
        <div id="start-btn" class="main-symbol" style="font-size:100px; cursor:pointer;">🌹</div>
        <div id="final-card">
            <h2 id="final-title" style="font-family:'Great Vibes'; font-size:45px; color:var(--primary); margin:0 0 15px 0;"></h2>
            <p id="final-msg" style="font-size:18px; font-weight:200; line-height:1.6; color:#fff; white-space: pre-wrap;"></p>
        </div>
        <a href="#" class="create-own-btn" onclick="goToHome(event)">✨ Napravi i ti svoju karticu</a>
    </div>

    <script>
        let globalFinalUrl = "";

        const poruke = {
            "🌹|🌹|#250000": Array.from({length: 50}, (_, i) => ["Sretna godišnjica!", "Zauvijek tvoj.", "Hvala za svaki dan.", "Ti si moj život.", "Volim te do neba."][i % 5]),
            "🎂|✨|#000025": Array.from({length: 50}, (_, i) => ["Sretan rođendan!", "Danas slavimo tebe!", "Sve najbolje!", "Neka ti se snovi ostvare."][i % 4]),
            "🎈|🎉|#001a1a": Array.from({length: 50}, (_, i) => [
                "Pozvani ste na moj rođendan!", "Slavimo ludo! Dođite u subotu.", "Rođendanski party - ne propustite!", "Čekam vas da ugasimo svjećice.", "Vrijeme je za zabavu! Vidimo se.", 
                "Pozivnica za najluđu žurku godine!", "Slavimo moj poseban dan zajedno.", "Tvoje prisustvo je moj najveći poklon.", "Spremite se za ples i tortu!", "Rezerviši datum, slavimo rođendan!"
            ][i % 10]),
            "💌|💍|#1a1000": Array.from({length: 50}, (_, i) => [
                "Pozivamo vas na naše vjenčanje.", "Naše sudbonosno DA - budite uz nas.", "Slavimo ljubav, pridružite nam se.", "Pozivnica za dan koji se pamti.", "Vaše prisustvo nam mnogo znači.",
                "Zajedno u vječnost - dođite na svadbu.", "Naša bajka počinje, budite dio nje.", "Vjenčanje godine! Vidimo se.", "S ljubavlju vas pozivamo na proslavu.", "Ljubav, muzika i vi - naša savršena svadba."
            ][i % 10]),
            "💖|🌸|#1a001a": Array.from({length: 50}, (_, i) => ["Volim te!", "Samo mislim na tebe.", "Ti si moje sve.", "Najljepša si."][i % 4])
        };

        function loadMessages() {
            const theme = document.getElementById('set-theme').value;
            const select = document.getElementById('quick-msg');
            select.innerHTML = '<option value="">-- Brze ideje (50 opcija) --</option>';
            (poruke[theme] || []).forEach(m => {
                let opt = document.createElement('option'); opt.value = m;
                opt.innerHTML = m.substring(0, 40) + "..."; select.appendChild(opt);
            });
            updatePreview();
        }

        function applyQuickMsg() {
            const val = document.getElementById('quick-msg').value;
            if(val) { document.getElementById('set-msg').value = val; updatePreview(); }
        }

        function updatePreview() {
            const d = document.getElementById('set-theme').value.split('|');
            document.getElementById('view-icon').innerText = d[0];
            document.getElementById('view-title').innerText = document.getElementById('set-title').value;
            document.getElementById('view-msg').innerText = document.getElementById('set-msg').value;
            document.getElementById('live-view').style.background = `radial-gradient(circle at center, ${d[2]} 0%, #000 100%)`;
        }

        function generateAndCopy() {
            gtag('event', 'generate_card', { 'event_category': 'Engagement', 'event_label': document.getElementById('set-theme').value.split('|')[0] });
            const theme = document.getElementById('set-theme').value;
            const title = encodeURIComponent(document.getElementById('set-title').value || "Za tebe");
            const msg = encodeURIComponent(document.getElementById('set-msg').value || "Pozvani ste!");
            
            globalFinalUrl = `${window.location.origin}${window.location.pathname}?data=${encodeURIComponent(theme)}&t=${title}&m=${msg}`;
            
            const el = document.createElement('textarea'); el.value = globalFinalUrl;
            document.body.appendChild(el); el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            
            document.getElementById('link-box').style.display = 'block';
            
            // Aktiviraj share sekciju
            document.getElementById('share-section').style.display = 'block';
            const shareTxt = encodeURIComponent("Pogledaj ovu digitalnu čestitku koju sam ti napravio/la: ");
            document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${shareTxt}${globalFinalUrl}`;
            document.getElementById('share-viber').href = `viber://forward?text=${shareTxt}${globalFinalUrl}`;

            setTimeout(() => { document.getElementById('link-box').style.display = 'none'; }, 4000);
        }

        async function systemShare() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Eternal Heart Čestitka',
                        text: 'Napravio sam ti nešto posebno! ✨',
                        url: globalFinalUrl,
                    });
                } catch (err) { console.log("Share error: ", err); }
            } else {
                alert("Link je već kopiran! Možeš ga zalijepiti (Paste) u bilo koju aplikaciju.");
            }
        }

        function goToHome(e) { e.preventDefault(); window.location.href = window.location.origin + window.location.pathname; }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('data')) {
                document.getElementById('builder-site').style.display = 'none';
                document.getElementById('romance-site').style.display = 'flex';
                const d = decodeURIComponent(p.get('data')).split('|');
                document.getElementById('romance-site').style.background = `radial-gradient(circle at center, ${d[2]} 0%, #000 100%)`;
                document.getElementById('start-btn').innerText = d[0];
                document.getElementById('final-title').innerText = decodeURIComponent(p.get('t'));
                document.getElementById('final-msg').innerText = decodeURIComponent(p.get('m'));
                document.getElementById('start-btn').onclick = function() {
                    this.style.display = 'none';
                    document.getElementById('final-card').style.display = 'block';
                    setInterval(() => {
                        const s = document.createElement('div'); s.className = 'petal'; s.innerHTML = d[1];
                        s.style.left = Math.random() * 100 + 'vw';
                        s.style.fontSize = Math.random() * 20 + 25 + 'px';
                        s.style.animationDuration = Math.random() * 3 + 6 + 's';
                        document.body.appendChild(s); setTimeout(() => s.remove(), 8000);
                    }, 400);
                };
            } else { loadMessages(); updatePreview(); }
        };
    </script>
</body>
</html>
