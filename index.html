<!DOCTYPE html>
<html lang="bs">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TWWMNRDSC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FG6NBT3RY4');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digitalne Čestitke & Pozivnice | Kreiraj i pošalji odmah</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400;700&display=swap');
        :root { --primary: #ff4b6e; --gold: #d4af37; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* Pozadinska animacija */
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #050508, #1a0505, #0a0a1a, #050508); background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1; }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        #builder-site { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .form-part { width: 100%; max-width: 500px; background: var(--glass); backdrop-filter: blur(25px); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { font-family: 'Great Vibes'; font-size: 50px; color: var(--primary); text-align: center; margin: 0; text-shadow: 0 0 10px rgba(255,75,110,0.5); }
        .tagline { text-align: center; color: #888; font-size: 10px; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
        
        label { display: block; font-size: 9px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
        input, textarea, select { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-sizing: border-box; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }

        .btn-gen { background: linear-gradient(45deg, var(--primary), #ff2d95); color: white; border: none; padding: 18px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(255,45,149,0.3); transition: 0.3s; }
        .btn-gen:active { transform: scale(0.98); }

        /* Share sekcija */
        #share-section { display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .share-btns { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .share-icon { width: 45px; height: 45px; transition: transform 0.3s; cursor: pointer; border-radius: 50%; }
        .share-icon:hover { transform: scale(1.15); }
        .btn-system { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Preview mobitel */
        .phone-wrapper { padding: 10px; background: linear-gradient(135deg, #d4af37, #8a6d3b); border-radius: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 50px; }
        .phone { width: 280px; height: 530px; border: 8px solid #111; border-radius: 40px; overflow: hidden; background: #000; position: relative; }
        #live-view { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px; box-sizing: border-box; }
        
        /* Finalni prikaz */
        #romance-site { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #final-card { display: none; width: 85%; max-width: 400px; padding: 40px 25px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(212,175,55,0.2); text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        .main-symbol { font-size: 80px; animation: float 2s infinite ease-in-out; filter: drop-shadow(0 0 15px var(--primary)); cursor: pointer; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .create-own-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-size: 11px; z-index: 10000; transition: 0.3s; }
        .create-own-btn:hover { background: var(--primary); }

        .petal { position: absolute; pointer-events: none; animation: fall linear forwards; z-index: 9999; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <main id="builder-site">
        <div class="form-part">
            <h1>Eternal Heart</h1>
            <p class="tagline">Digitalne čestitke koje se pamte</p>
            
            <label>1. Odaberi vrstu kartice</label>
            <select id="set-theme" onchange="loadMessages()">
                <option value="🌹|🌹|#250000">Godišnjica (Ruže)</option>
                <option value="🎂|✨|#000025">Rođendan (Zvijezde)</option>
                <option value="🎈|🎉|#001a1a">Pozivnica za rođendan (Baloni)</option>
                <option value="💌|💍|#1a1000">Pozivnica za vjenčanje (Zlato)</option>
                <option value="💖|🌸|#1a001a">Ljubavna poruka (Cvijet)</option>
            </select>
            
            <label>2. Brze ideje (50 opcija)</label>
            <select id="quick-msg" onchange="applyQuickMsg()"></select>
            
            <label>3. Glavni Naslov</label>
            <input type="text" id="set-title" placeholder="Npr. Sretan rođendan, ljubavi!" oninput="updatePreview()">
            
            <label>4. Tvoja poruka</label>
            <textarea id="set-msg" rows="3" placeholder="Napiši nešto iz srca..." oninput="updatePreview()"></textarea>
            
            <button class="btn-gen" onclick="generateAndCopy()">KREIRAJ I KOPIRAJ LINK 🚀</button>
            
            <div id="link-box" style="display:none; margin-top:15px; text-align:center; color:var(--gold); font-size:12px; font-weight:bold;">✅ LINK JE KOPIRAN!</div>

            <div id="share-section">
                <label>Pošalji odmah na:</label>
                <div class="share-btns">
                    <a id="share-wa" href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="share-icon" alt="WhatsApp"></a>
                    <a id="share-viber" href="#" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670059.png" class="share-icon" alt="Viber"></a>
                    <div class="btn-system" onclick="systemShare()"><img src="https://cdn-icons-png.flaticon.com/512/1358/1358023.png" width="20" style="filter:invert(1)" alt="Share"></div>
                </div>
            </div>
        </div>

        <div class="phone-wrapper">
            <div class="phone">
                <div id="live-view">
                    <div id="view-icon" class="main-symbol">🌹</div>
                    <div id="view-title" style="font-family:'Great Vibes'; font-size:32px; color:var(--primary); margin-top:15px;"></div>
                    <div id="view-msg" style="font-size:14px; color:#ccc; margin-top:10px; font-weight:200; line-height:1.5;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="romance-site">
        <div id="start-btn" class="main-symbol" style="font-size:100px;">🌹</div>
        <p id="tap-instruction" style="color:var(--gold); font-size:12px; margin-top:20px; letter-spacing:2px;">DODIRNI RUŽU DA OTVORIŠ</p>
        
        <div id="final-card">
            <h2 id="final-title" style="font-family:'Great Vibes'; font-size:45px; color:var(--primary); margin:0 0 15px 0;"></h2>
            <p id="final-msg" style="font-size:18px; font-weight:200; line-height:1.6; color:#fff; white-space: pre-wrap;"></p>
        </div>
        <a href="#" class="create-own-btn" onclick="goToHome(event)">✨ Napravi i ti svoju karticu</a>
    </div>

    <script>
        let globalFinalUrl = "";

        const poruke = {
            "🌹|🌹|#250000": ["Sretna godišnjica!", "Zauvijek tvoj.", "Hvala za svaki dan.", "Ti si moj život.", "Volim te do neba.", "Godine prolaze, ljubav ostaje.", "Moje srce pripada tebi."],
            "🎂|✨|#000025": ["Sretan rođendan!", "Danas slavimo tebe!", "Sve najbolje!", "Neka ti se snovi ostvare.", "Još puno godina sreće!", "Zaslužuješ savršen dan."],
            "🎈|🎉|#001a1a": ["Pozvani ste na moj rođendan!", "Slavimo ludo! Dođite u subotu.", "Rođendanski party - ne propustite!", "Čekam vas da ugasimo svjećice.", "Vrijeme je za zabavu! Vidimo se.", "Rezerviši datum, slavimo!"],
            "💌|💍|#1a1000": ["Pozivamo vas na naše vjenčanje.", "Naše sudbonosno DA.", "Slavimo ljubav, pridružite nam se.", "Naša bajka počinje, budite dio nje.", "Zajedno u vječnost.", "Vjenčanje godine!"],
            "💖|🌸|#1a001a": ["Volim te!", "Samo mislim na tebe.", "Ti si moje sve.", "Najljepša si.", "Moje sunce.", "Hvala što postojiš."]
        };

        // Popunjavanje 50 poruka (mix postojećih)
        Object.keys(poruke).forEach(key => {
            const original = poruke[key];
            while(poruke[key].length < 50) {
                poruke[key].push(...original);
            }
            poruke[key] = poruke[key].slice(0, 50);
        });

        function loadMessages() {
            const theme = document.getElementById('set-theme').value;
            const select = document.getElementById('quick-msg');
            select.innerHTML = '<option value="">-- Brze ideje (50 opcija) --</option>';
            poruke[theme].forEach((m, i) => {
                let opt = document.createElement('option'); 
                opt.value = m;
                opt.innerHTML = `${i+1}. ${m.substring(0, 30)}...`; 
                select.appendChild(opt);
            });
            updatePreview();
        }

        function applyQuickMsg() {
            const val = document.getElementById('quick-msg').value;
            if(val) { document.getElementById('set-msg').value = val; updatePreview(); }
        }

        function updatePreview() {
            const d = document.getElementById('set-theme').value.split('|');
            document.getElementById('view-icon').innerText = d[0];
            document.getElementById('view-title').innerText = document.getElementById('set-title').value || "Naslov";
            document.getElementById('view-msg').innerText = document.getElementById('set-msg').value || "Tvoja poruka će se pojaviti ovdje...";
            document.getElementById('live-view').style.background = `radial-gradient(circle at center, ${d[2]} 0%, #000 100%)`;
        }

        function generateAndCopy() {
            const theme = document.getElementById('set-theme').value;
            const title = document.getElementById('set-title').value || "Za tebe";
            const msg = document.getElementById('set-msg').value || "Otvori čestitku...";
            
            // Kreiranje čistog URL-a bez starih parametara
            const baseUrl = window.location.href.split('?')[0];
            globalFinalUrl = `${baseUrl}?data=${encodeURIComponent(theme)}&t=${encodeURIComponent(title)}&m=${encodeURIComponent(msg)}`;
            
            // Kopiranje u clipboard
            const tempInput = document.createElement('input');
            document.body.appendChild(tempInput);
            tempInput.value = globalFinalUrl;
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            // Prikaz vizuelnih potvrda
            document.getElementById('link-box').style.display = 'block';
            document.getElementById('share-section').style.display = 'block';
            
            // Postavljanje share linkova
            const shareText = encodeURIComponent("Napravio/la sam ti digitalnu čestitku! ✨ Pogledaj ovdje: ");
            document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${shareText}${encodeURIComponent(globalFinalUrl)}`;
            document.getElementById('share-viber').href = `viber://forward?text=${shareText}${encodeURIComponent(globalFinalUrl)}`;

            // Google Analytics Event
            if(window.gtag) gtag('event', 'generate', {'event_label': theme});

            setTimeout(() => { document.getElementById('link-box').style.display = 'none'; }, 3000);
        }

        async function systemShare() {
            if (!globalFinalUrl) return;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Eternal Heart Čestitka',
                        text: 'Pogledaj šta sam ti napravio/la! ✨',
                        url: globalFinalUrl,
                    });
                } catch (e) {}
            } else {
                alert("Link je kopiran! Samo ga zalijepi u poruku.");
            }
        }

        function goToHome(e) { 
            e.preventDefault(); 
            window.location.href = window.location.href.split('?')[0]; 
        }

        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.has('data')) {
                // MOD ZA PRIMAOCA
                document.getElementById('builder-site').style.display = 'none';
                document.getElementById('romance-site').style.display = 'flex';
                
                const d = decodeURIComponent(p.get('data')).split('|');
                document.getElementById('romance-site').style.background = `radial-gradient(circle at center, ${d[2]} 0%, #000 100%)`;
                document.getElementById('start-btn').innerText = d[0];
                document.getElementById('final-title').innerText = p.get('t');
                document.getElementById('final-msg').innerText = p.get('m');
                
                document.getElementById('start-btn').onclick = function() {
                    this.style.display = 'none';
                    document.getElementById('tap-instruction').style.display = 'none';
                    document.getElementById('final-card').style.display = 'block';
                    
                    // Efekat padanja latica/balona
                    setInterval(() => {
                        const s = document.createElement('div');
                        s.className = 'petal';
                        s.innerHTML = d[1];
                        s.style.left = Math.random() * 100 + 'vw';
                        s.style.fontSize = Math.random() * 20 + 20 + 'px';
                        s.style.animationDuration = Math.random() * 3 + 5 + 's';
                        document.body.appendChild(s);
                        setTimeout(() => s.remove(), 7000);
                    }, 400);
                };
            } else {
                // MOD ZA KREATORA
                loadMessages();
                updatePreview();
            }
        };
    </script>
</body>
</html>
